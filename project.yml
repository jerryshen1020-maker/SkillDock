name: SkillsManager
options:
  deploymentTarget:
    macOS: '12.0'
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.mac.SkillsManager
    SWIFT_VERSION: '5.9'
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  SkillsManager:
    type: application
    platform: macOS
    sources:
      - path: SkillsManager
    settings:
      base:
        PRODUCT_NAME: SkillDock
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SkillDock
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    scheme:
      testTargets:
        - SkillsManagerTests
  SkillsManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SkillsManagerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SkillDock.app/Contents/MacOS/SkillDock
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: SkillsManager
