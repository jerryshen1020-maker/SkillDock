name: SkillDock
options:
  deploymentTarget:
    macOS: '12.0'
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.mac.SkillDock
    SWIFT_VERSION: '5.9'
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  SkillDock:
    type: application
    platform: macOS
    sources:
      - path: SkillDock
    settings:
      base:
        PRODUCT_NAME: SkillDock
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SkillDock
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    scheme:
      testTargets:
        - SkillDockTests
        - SkillDockUITests
  SkillDockTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SkillDockTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SkillDock.app/Contents/MacOS/SkillDock
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: SkillDock
  SkillDockUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SkillDockUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SkillDock
    dependencies:
      - target: SkillDock
